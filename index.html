<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>문자열 저장/불러오기 (줄바꿈 지원)</title>
</head>
<body>
  <h1>문자열 저장/불러오기</h1>

  <!-- 여러 줄 입력 가능 -->
  <textarea id="stringInput" rows="5" cols="40" placeholder="여러 줄 문자열 입력"></textarea><br>
  <button onclick="saveString()">저장</button>
  <button onclick="getString()">불러오기</button>

  <pre id="result"></pre> <!-- 줄바꿈 유지해서 출력 -->
  
  <script>
    const baseUrl = "https://ascii-server.kimkwon1406.workers.dev";

    async function saveString() {
      const str = document.getElementById("stringInput").value;
      const res = await fetch(baseUrl + "/save", {
        method: "POST",
        body: str
      });
      document.getElementById("result").innerText = await res.text();
    }

    async function getString() {
      const res = await fetch(baseUrl + "/get");
      document.getElementById("result").innerText = await res.text();
    }
  </script>
</body>
</html>
