<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>문자열 저장/불러오기 (비밀번호 별도)</title>
  <style>
    #ioBox {
      white-space: pre-wrap; /* 줄바꿈 유지 */
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      width: 400px;
      min-height: 150px;
    }
    #passwordInput {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>문자열 저장/불러오기</h1>

  <!-- 비밀번호 입력창 -->
  <input id="passwordInput" type="password" placeholder="비밀번호 입력"><br><br>

  <!-- 문자열 입력/출력창 -->
  <textarea id="ioBox" rows="8" cols="50" placeholder="여기에 문자열 입력 또는 불러온 결과 표시"></textarea><br>

  <button onclick="saveString()">저장</button>
  <button onclick="getString()">불러오기</button>

  <script>
    const baseUrl = "https://ascii-server.kimkwon1406.workers.dev";

    async function saveString() {
      const password = document.getElementById("passwordInput").value;
      const str = document.getElementById("ioBox").value;
      const body = password + "\n" + str; // 첫 줄: 비밀번호, 이후: 문자열

      const res = await fetch(baseUrl + "/save", {
        method: "POST",
        body: body
      });
      document.getElementById("ioBox").value = await res.text();
    }

    async function getString() {
      const password = document.getElementById("passwordInput").value;

      const res = await fetch(baseUrl + "/get", {
        method: "POST",
        body: password
      });
      document.getElementById("ioBox").value = await res.text();
    }
  </script>
</body>
</html>
