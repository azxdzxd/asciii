<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KV 기반 문자열 저장/불러오기</title>
  <style>
    #ioBox {
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      width: 400px;
      min-height: 150px;
    }
    #keyInput {
      margin-bottom: 10px;
    }
    #responseBox {
      margin-top: 15px;
      padding: 10px;
      border: 1px solid #666;
      background: #f9f9f9;
      width: 400px;
      min-height: 50px;
    }
  </style>
</head>
<body>
  <h1>KV 기반 문자열 저장/불러오기</h1>

  <!-- 번호 입력 -->
  <input id="keyInput" type="text" placeholder="문자열 번호 입력"><br>

  <!-- 문자열 입력 -->
  <textarea id="ioBox" rows="8" cols="50" placeholder="저장할 문자열 입력"></textarea><br>

  <button onclick="saveString()">저장</button>
  <button onclick="getString()">불러오기</button>

  <!-- 응답 출력 영역 -->
  <div id="responseBox">응답 메시지가 여기에 표시됩니다</div>

  <script>
    const baseUrl = "https://ascii-server.kimkwon1406.workers.dev";

    async function saveString() {
      const key = document.getElementById("keyInput").value;
      const str = document.getElementById("ioBox").value;
      const body = key + "\n" + str;

      const res = await fetch(baseUrl + "/save", {
        method: "POST",
        body: body
      });
      // 저장 결과는 아래 응답 박스에만 표시
      document.getElementById("responseBox").innerText = await res.text();
    }

    async function getString() {
      const key = document.getElementById("keyInput").value;
      const res = await fetch(baseUrl + "/get", {
        method: "POST",
        body: key
      });
      const text = await res.text();
      // 불러온 문자열은 입력창에 표시
      document.getElementById("ioBox").value = text;
      // 응답 메시지는 아래 박스에도 표시
      document.getElementById("responseBox").innerText = "불러오기 완료";
    }
  </script>
</body>
</html>
