<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>키 기반 문자열 저장/불러오기</title>
  <style>
    #ioBox {
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      width: 400px;
      min-height: 150px;
    }
    #keyInput, #indexInput {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>키 기반 문자열 저장/불러오기</h1>

  <!-- 키 입력 -->
  <input id="keyInput" type="text" placeholder="키 입력"><br>

  <!-- 문자열 번호 입력 -->
  <input id="indexInput" type="number" placeholder="문자열 번호 (불러오기용)"><br>

  <!-- 문자열 입력/출력 -->
  <textarea id="ioBox" rows="8" cols="50" placeholder="저장할 문자열 입력 또는 불러온 결과 표시"></textarea><br>

  <button onclick="saveString()">저장</button>
  <button onclick="getString()">불러오기</button>

  <script>
    const baseUrl = "https://ascii-server.kimkwon1406.workers.dev";

    async function saveString() {
      const key = document.getElementById("keyInput").value;
      const str = document.getElementById("ioBox").value;
      const body = key + "\n" + str;

      const res = await fetch(baseUrl + "/save", {
        method: "POST",
        body: body
      });
      document.getElementById("ioBox").value = await res.text();
    }

    async function getString() {
      const key = document.getElementById("keyInput").value;
      const index = document.getElementById("indexInput").value;
      const body = key + "\n" + index;

      const res = await fetch(baseUrl + "/get", {
        method: "POST",
        body: body
      });
      document.getElementById("ioBox").value = await res.text();
    }
  </script>
</body>
</html>
